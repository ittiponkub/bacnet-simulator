<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BACnet Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0B0F1A;
    color: #F1F5F9;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 28px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo svg { color: #38BDF8; }
  .logo-text {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(56,189,248,0.15);
    border-top-color: #38BDF8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status {
    color: #64748B;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }
  .status span { color: #94A3B8; }
</style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    <span class="logo-text">BACnet Simulator</span>
  </div>
  <div class="spinner"></div>
  <div class="status">
    <span>Starting...</span><br>
    Initializing BACnet engine
  </div>
  <script>
    const msgs = [
      'Initializing BACnet engine',
      'Loading device configuration',
      'Starting API server',
      'Preparing UI',
      'Almost ready...',
    ];
    let i = 0;
    const el = document.querySelector('.status');
    setInterval(() => {
      i = Math.min(i + 1, msgs.length - 1);
      el.innerHTML = '<span>Starting...</span><br>' + msgs[i];
    }, 1500);

    // poll จน API พร้อมแล้ว redirect
    function check() {
      fetch('/api/engine/status')
        .then(r => { if (r.ok) window.location.href = '/'; else setTimeout(check, 500); })
        .catch(() => setTimeout(check, 500));
    }
    setTimeout(check, 1000);
  </script>
</body>
</html>
